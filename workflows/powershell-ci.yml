name: Reusable PowerShell CI
on:
  workflow_call:
    inputs:
      project-path:
        type: string
        required: false
        default: .
permissions:
  contents: read
jobs:
  powershell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Governance validation
        shell: pwsh
        run: pwsh -NoProfile -File scripts/Invoke-GovernanceValidation.ps1 -Path '${{ inputs.project-path }}' -Category Contract,ForbiddenPatterns,RepositoryHealth
      - name: Parser validation
        shell: pwsh
        run: Get-ChildItem -Path '${{ inputs.project-path }}' -Filter *.ps1 -Recurse | ForEach-Object { [System.Management.Automation.Language.Parser]::ParseFile($_.FullName,[ref]$null,[ref]$null) | Out-Null }
