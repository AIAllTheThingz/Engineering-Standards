# Distribution template only. GitHub does not execute reusable workflows from
# this root workflows/ directory. Copy this file into .github/workflows/ in a
# downstream repository or call:
# AIAllTheThingz/Engineering-Standards/.github/workflows/governance-ci-reusable.yml@<full-commit-sha>
name: Governance

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

concurrency:
  group: governance-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    name: Governance
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/governance-ci-reusable.yml@<full-commit-sha>
    with:
      project-path: .
      governance-version: 1.1.0
