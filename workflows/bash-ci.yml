# Distribution template. Copy this file into .github/workflows/ before use.
name: Governed Bash CI

on:
  workflow_call:
    inputs:
      project-path:
        type: string
        required: false
        default: .

permissions:
  contents: read

jobs:
  bash:
    name: Bash validation
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/bash-ci-reusable.yml@bd0536d35b9731dd8d82fa7b8538170c58e7f1d2
    with:
      project-path: ${{ inputs.project-path }}
