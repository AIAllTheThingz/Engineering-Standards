# Distribution template. Copy this file into .github/workflows/ before use.
name: Governed Bash CI

on:
  workflow_call:
    inputs:
      project-path:
        type: string
        required: false
        default: .

permissions:
  contents: read

jobs:
  bash:
    name: Bash validation
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/bash-ci-reusable.yml@b4a2d4f678a2e9fa922f35cfab0767dc283e9d6c
    with:
      project-path: ${{ inputs.project-path }}
