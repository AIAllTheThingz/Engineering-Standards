name: Governed Bash CI

on:
  workflow_call:
    inputs:
      project-path:
        type: string
        required: false
        default: .

permissions:
  contents: read

jobs:
  bash:
    name: Bash validation
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/bash-ci-reusable.yml@28e312386f07741f03d198812437be56d1d9b9bb
    with:
      project-path: ${{ inputs.project-path }}
