name: Governed Bash CI

on:
  workflow_call:
    inputs:
      project-path:
        type: string
        required: false
        default: .

permissions:
  contents: read

jobs:
  bash:
    name: Bash validation
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/bash-ci-reusable.yml@a23ae6295f132746043382ed38fc41300c9c1489
    with:
      project-path: ${{ inputs.project-path }}
