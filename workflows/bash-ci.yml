# Distribution template. Copy this file into .github/workflows/ before use.
name: Governed Bash CI

on:
  workflow_call:
    inputs:
      project-path:
        type: string
        required: false
        default: .

permissions:
  contents: read

jobs:
  bash:
    name: Bash validation
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/bash-ci-reusable.yml@41506b2444b936e508c533c0e8b41ef6f0c432b9
    with:
      project-path: ${{ inputs.project-path }}
