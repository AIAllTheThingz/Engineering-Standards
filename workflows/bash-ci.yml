# Distribution template. Copy this file into .github/workflows/ before use.
name: Governed Bash CI

on:
  workflow_call:
    inputs:
      project-path:
        type: string
        required: false
        default: .

permissions:
  contents: read

jobs:
  bash:
    name: Bash validation
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/bash-ci-reusable.yml@5b3da11ed7780e192f3313c6d92a968554c2477c
    with:
      project-path: ${{ inputs.project-path }}
