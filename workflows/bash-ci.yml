# Distribution template. Copy this file into .github/workflows/ before use.
name: Governed Bash CI

on:
  workflow_call:
    inputs:
      project-path:
        type: string
        required: false
        default: .

permissions:
  contents: read

jobs:
  bash:
    name: Bash validation
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/bash-ci-reusable.yml@48a5a75cbdd6f21338a50f9715d72373e164d758
    with:
      project-path: ${{ inputs.project-path }}
