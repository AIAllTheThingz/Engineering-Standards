# Distribution template only. GitHub does not execute reusable workflows from
# this root workflows/ directory until copied into .github/workflows/ in a
# downstream repository.
name: Web CI

on:
  workflow_call:
    inputs:
      project-path:
        type: string
        required: false
        default: .
      node-version:
        type: string
        required: false
        default: '22'

permissions:
  contents: read

jobs:
  web:
    name: Build and test web project
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.project-path }}/package-lock.json

      - name: Install
        run: npm ci
        working-directory: ${{ inputs.project-path }}

      - name: Lint
        run: npm run lint
        working-directory: ${{ inputs.project-path }}

      - name: Test
        run: npm test
        working-directory: ${{ inputs.project-path }}

      - name: Build
        run: npm run build
        working-directory: ${{ inputs.project-path }}

      - name: Upload web evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: web-evidence-${{ github.run_id }}
          path: evidence/
          if-no-files-found: error
          retention-days: 30
