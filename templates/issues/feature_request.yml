name: Feature Request
description: Request a governance standard, validation, workflow, schema, template, or documentation improvement.
title: "Feature: "
labels: [governance, enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: Describe the gap this request addresses.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the requested behavior, documentation, schema, workflow, or template change.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Downstream impact
      description: Describe affected repositories, compatibility, migration, evidence, and release impact.
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Expected risk
      options:
        - Low
        - Moderate
        - High
        - Critical
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation idea
      description: Describe how maintainers could test or prove this change works.
