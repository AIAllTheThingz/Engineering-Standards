name: Local Governance Reusable Entry
on:
  workflow_call:
    inputs:
      project-path:
        type: string
        required: false
        default: .
      governance-version:
        type: string
        required: false
        default: 1.0.0
permissions:
  contents: read
jobs:
  governance:
    uses: ../../workflows/governance-ci.yml
    with:
      project-path: ${{ inputs.project-path }}
      governance-version: ${{ inputs.governance-version }}
