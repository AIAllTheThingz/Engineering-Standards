name: Reusable Governance CI

on:
  workflow_call:
    inputs:
      project-path:
        description: Caller-repository-relative path to validate. Absolute paths, traversal, links, and workspace escapes are rejected.
        type: string
        required: false
        default: .
      governance-version:
        description: Expected governance standard version. Must match the caller manifest.
        type: string
        required: false
        default: 1.1.0
      artifact-retention-days:
        description: Retention period for governance evidence artifacts. Valid range is 1 through 90 days.
        type: number
        required: false
        default: 30
      controlled-failure-test:
        description: Safe failure path proving evidence upload before final enforcement.
        type: boolean
        required: false
        default: false
    outputs:
      evidence-path:
        description: Completion evidence path.
        value: ${{ jobs.governance.outputs.evidence-path }}
      artifact-name:
        description: Uploaded artifact name.
        value: ${{ jobs.governance.outputs.artifact-name }}

permissions:
  contents: read

jobs:
  governance:
    name: Governance validation
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      evidence-path: ${{ steps.evidence_final.outputs.evidence-path }}
      artifact-name: ${{ steps.artifact.outputs.artifact-name }}
    steps:
      - name: Checkout caller
        # actions/checkout v4.2.2 pinned by commit SHA.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: caller
          persist-credentials: false
          # Evidence commit semantics require historical validatedCommitSha objects.
          fetch-depth: 0

      - name: Checkout trusted standards
        # job.workflow_* identifies the immutable repository and commit defining this reusable job.
        # These properties are available on GitHub.com but not GitHub Enterprise Server.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: standards
          persist-credentials: false
          fetch-depth: 1

      - name: Validate workflow identity and inputs
        id: inputs
        shell: pwsh
        env:
          STANDARDS_REPOSITORY: ${{ job.workflow_repository }}
          STANDARDS_WORKFLOW_SHA: ${{ job.workflow_sha }}
          CALLER_REPOSITORY: ${{ github.repository }}
          CALLER_COMMIT_SHA: ${{ github.sha }}
          CALLER_REPOSITORY_OWNER_TYPE: ${{ github.event.repository.owner.type }}
          CALLER_REF_NAME: ${{ github.ref_name }}
          GOVERNANCE_VERSION: ${{ inputs.governance-version }}
          STANDARDS_WORKFLOW_REF: ${{ job.workflow_ref }}
          PROJECT_PATH: ${{ inputs.project-path }}
          RETENTION_DAYS: ${{ inputs.artifact-retention-days }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:STANDARDS_REPOSITORY -ne 'AIAllTheThingz/Engineering-Standards') {
            throw "Unexpected reusable workflow repository '$env:STANDARDS_REPOSITORY'."
          }
          if ($env:STANDARDS_WORKFLOW_SHA -notmatch '^[a-fA-F0-9]{40}$') {
            throw 'GitHub did not provide an immutable job.workflow_sha. GitHub Enterprise Server is not supported because no safe fallback exists.'
          }
          if ([string]::IsNullOrWhiteSpace($env:PROJECT_PATH)) { throw 'project-path must not be empty.' }
          if ([System.IO.Path]::IsPathRooted($env:PROJECT_PATH) -or $env:PROJECT_PATH -match '(^|[\/])\.\.([\/]|$)') {
            throw 'project-path must be repository-relative and must not contain traversal.'
          }
          $retention = [int]$env:RETENTION_DAYS
          if ($retention -lt 1 -or $retention -gt 90) { throw 'artifact-retention-days must be between 1 and 90.' }
          $repositoryOwnerType = switch -CaseSensitive ($env:CALLER_REPOSITORY_OWNER_TYPE) {
            'User' { 'User'; break }
            'Organization' { 'Organization'; break }
            default { 'Unknown' }
          }
          "repository-owner-type=$repositoryOwnerType" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "artifact-retention-days=$retention" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up pinned Python
        id: setup_python
        continue-on-error: true
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: 3.12.11

      - name: Set up pinned Node
        id: setup_node
        continue-on-error: true
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22.17.0

      - name: Set up pinned .NET
        id: setup_dotnet
        continue-on-error: true
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68
        with:
          dotnet-version: 8.0.411

      - name: Install hash-verified PowerShell runtime
        id: runtime
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path evidence -Force | Out-Null
          pwsh -NoProfile -File standards/scripts/Install-ValidatorRuntime.ps1 `
            -RepositoryPath standards `
            -PackageCachePath (Join-Path $env:RUNNER_TEMP 'validator-runtime-cache') `
            -InstallRoot (Join-Path $env:RUNNER_TEMP 'validator-pwsh-7.4.11') `
            -EvidencePath evidence/runtime-bootstrap.json

      - name: Install pinned validation dependencies
        id: dependencies
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          validator_pwsh="${VALIDATOR_PWSH:-pwsh}"
          "$validator_pwsh" -NoProfile -File standards/scripts/Install-ValidatorDependencies.ps1 \
            -RepositoryPath standards \
            -PackageCachePath "$RUNNER_TEMP/validator-package-cache" \
            -ModuleRoot "$RUNNER_TEMP/validator-psmodules" \
            -PythonPackageRoot "$RUNNER_TEMP/validator-python" \
            -ToolRoot "$RUNNER_TEMP/validator-tools" \
            -EvidencePath evidence/dependencies.json \
            -SbomPath evidence/validator-sbom.cdx.json \
            -RuntimeEvidencePath evidence/runtime-bootstrap.json

      - name: Record validation environment information
        id: environment
        if: always()
        shell: pwsh
        env:
          STANDARDS_REPOSITORY: ${{ job.workflow_repository }}
          STANDARDS_WORKFLOW_SHA: ${{ job.workflow_sha }}
          STANDARDS_WORKFLOW_REF: ${{ job.workflow_ref }}
          CALLER_REPOSITORY: ${{ github.repository }}
          CALLER_REPOSITORY_OWNER_TYPE: ${{ steps.inputs.outputs.repository-owner-type }}
          CALLER_COMMIT_SHA: ${{ github.sha }}
          CALLER_REF: ${{ github.ref }}
          CALLER_REF_NAME: ${{ github.ref_name }}
          GOVERNANCE_VERSION: ${{ inputs.governance-version }}
          PROJECT_PATH: ${{ inputs.project-path }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUNNER_OS_NAME: ${{ runner.os }}
        run: |
          Import-Module ./standards/scripts/ValidatorDependencyTools.psm1 -Force
          $lock = Import-ValidatorDependencyLock -Path ./standards/.github/dependencies/validator-dependencies.psd1
          [ordered]@{
            callerRepository = $env:CALLER_REPOSITORY
            callerRepositoryOwnerType = $env:CALLER_REPOSITORY_OWNER_TYPE
            callerCommitSha = $env:CALLER_COMMIT_SHA
            callerRef = $env:CALLER_REF
            callerRefName = $env:CALLER_REF_NAME
            callerWorkspace = 'caller'
            standardsRepository = $env:STANDARDS_REPOSITORY
            standardsWorkflowSha = $env:STANDARDS_WORKFLOW_SHA
            standardsWorkflowRef = $env:STANDARDS_WORKFLOW_REF
            standardsWorkspace = 'standards'
            evidenceWorkspace = 'evidence'
            runId = $env:RUN_ID
            runAttempt = $env:RUN_ATTEMPT
            workflow = $env:WORKFLOW_NAME
            runnerOs = $env:RUNNER_OS_NAME
            runnerLabel = $lock.Runner.Label
            runnerImageOs = $env:ImageOS
            runnerImageVersion = $env:ImageVersion
            runnerArchitecture = $env:RUNNER_ARCH
            governanceVersion = $env:GOVERNANCE_VERSION
            projectPath = $env:PROJECT_PATH
            runtimes = @(Get-ValidatorCommandInventory -Lock $lock -WorkingDirectory ./standards)
            dependencyLockSha256 = Get-ValidatorFileSha256 -Path ./standards/.github/dependencies/validator-dependencies.psd1
            pythonRequirementsSha256 = Get-ValidatorFileSha256 -Path ./standards/.github/dependencies/workflow-validation-requirements.txt
          } | ConvertTo-Json -Depth 15 | Set-Content -LiteralPath evidence/environment.json -Encoding utf8

      - name: Run trusted governance validation
        id: governance_validation
        if: steps.setup_python.outcome == 'success' && steps.setup_node.outcome == 'success' && steps.setup_dotnet.outcome == 'success' && steps.runtime.outcome == 'success' && steps.dependencies.outcome == 'success'
        continue-on-error: true
        shell: pwsh
        env:
          STANDARDS_REPOSITORY: ${{ job.workflow_repository }}
          STANDARDS_WORKFLOW_SHA: ${{ job.workflow_sha }}
          CALLER_REPOSITORY: ${{ github.repository }}
          CALLER_REPOSITORY_OWNER_TYPE: ${{ steps.inputs.outputs.repository-owner-type }}
          CALLER_COMMIT_SHA: ${{ github.sha }}
          GOVERNANCE_VERSION: ${{ inputs.governance-version }}
          PROJECT_PATH: ${{ inputs.project-path }}
          CONTROLLED_FAILURE: ${{ inputs.controlled-failure-test }}
        run: |
          & ./standards/scripts/Invoke-GovernanceValidation.ps1 `
            -Path ./caller `
            -ProjectPath $env:PROJECT_PATH `
            -EvidenceRoot ./evidence `
            -ExpectedGovernanceVersion $env:GOVERNANCE_VERSION `
            -CallerRepository $env:CALLER_REPOSITORY `
            -RepositoryOwnerType $env:CALLER_REPOSITORY_OWNER_TYPE `
            -CallerCommitSha $env:CALLER_COMMIT_SHA `
            -StandardsRepository $env:STANDARDS_REPOSITORY `
            -StandardsWorkflowSha $env:STANDARDS_WORKFLOW_SHA `
            -ControlledFailure:($env:CONTROLLED_FAILURE -eq 'true')

      - name: Ensure validation failure evidence
        id: validation_report
        if: always()
        shell: pwsh
        env:
          STANDARDS_REPOSITORY: ${{ job.workflow_repository }}
          STANDARDS_WORKFLOW_SHA: ${{ job.workflow_sha }}
          CALLER_REPOSITORY: ${{ github.repository }}
          CALLER_COMMIT_SHA: ${{ github.sha }}
          GOVERNANCE_VERSION: ${{ inputs.governance-version }}
          PROJECT_PATH: ${{ inputs.project-path }}
        run: |
          Import-Module ./standards/scripts/GovernanceValidation.psm1 -Force
          $failure = $null
          if (Test-Path -LiteralPath evidence/runtime-bootstrap.json -PathType Leaf) {
            $runtime = Get-Content -LiteralPath evidence/runtime-bootstrap.json -Raw | ConvertFrom-Json
            if ($runtime.status -in @('Failed','Blocked')) { $failure = [string]$(if($runtime.failureReason){$runtime.failureReason}else{$runtime.blockedReason}) }
          }
          if (Test-Path -LiteralPath evidence/dependencies.json -PathType Leaf) {
            $dependencies = Get-Content -LiteralPath evidence/dependencies.json -Raw | ConvertFrom-Json
            if ($dependencies.status -in @('Failed','Blocked')) { $failure = [string]$(if($dependencies.failureReason){$dependencies.failureReason}else{$dependencies.blockedReason}) }
          }
          Write-GovernanceBootstrapFailureReport `
            -EvidenceRoot ./evidence `
            -FailureMessage $failure `
            -CallerRepository $env:CALLER_REPOSITORY `
            -CallerCommitSha $env:CALLER_COMMIT_SHA `
            -ProjectPath $env:PROJECT_PATH `
            -StandardsRepository $env:STANDARDS_REPOSITORY `
            -StandardsWorkflowSha $env:STANDARDS_WORKFLOW_SHA `
            -GovernanceVersion $env:GOVERNANCE_VERSION `
            -WorkspaceRoot $env:GITHUB_WORKSPACE `
            -TemporaryRoot $env:RUNNER_TEMP | Out-Null

      - name: Normalize evidence report paths
        id: normalize_evidence_initial
        if: always()
        shell: pwsh
        run: pwsh -NoProfile -File standards/scripts/Normalize-EvidencePaths.ps1 -Path . -EvidencePath evidence

      - name: Generate workflow test evidence
        id: test_evidence_initial
        if: always()
        shell: pwsh
        run: |
          $outcomes = @{ evidence_validation='notrun'; github_execution='notrun' }
          $reports = @{ evidence_validation='evidence/evidence-validation.json'; github_execution='evidence/environment.json' }
          & ./standards/scripts/New-WorkflowTestEvidence.ps1 -RepositoryPath . -OutputPath evidence/ci-test-results.json -AggregateReportPath evidence/governance-validation.json -Outcomes $outcomes -Reports $reports -Runtime 'GitHub Actions ubuntu-24.04 / pinned pwsh' -ToolVersion $PSVersionTable.PSVersion.ToString()

      - name: Generate completion evidence
        id: evidence_initial
        if: always()
        shell: pwsh
        env:
          STANDARDS_REPOSITORY: ${{ job.workflow_repository }}
          STANDARDS_WORKFLOW_SHA: ${{ job.workflow_sha }}
          CALLER_REPOSITORY: ${{ github.repository }}
          CALLER_COMMIT_SHA: ${{ github.sha }}
          CALLER_REF_NAME: ${{ github.ref_name }}
          GOVERNANCE_VERSION: ${{ inputs.governance-version }}
        run: |
          $aggregate = Get-Content -LiteralPath evidence/governance-validation.json -Raw | ConvertFrom-Json
          $artifacts = @('evidence/environment.json','evidence/runtime-bootstrap.json','evidence/dependencies.json','evidence/validator-sbom.cdx.json','evidence/governance-validation.json','evidence/ci-test-results.json')
          $artifacts += @(@('evidence/pester-summary.json','evidence/pester-details.json','evidence/python-static-analysis.json','evidence/bash-static-analysis.json') | Where-Object { Test-Path -LiteralPath $_ -PathType Leaf })
          & ./standards/scripts/New-CompletionEvidence.ps1 -RepositoryPath . -SourceRepositoryPath ./caller -OutputPath evidence/completion-result.json -GovernanceVersion $env:GOVERNANCE_VERSION -RiskClassification $aggregate.riskClassification -ExecutionContext GitHubActions -ArtifactName 'governance-evidence-${{ github.run_id }}' -Summary 'Reusable governance workflow generated preliminary caller evidence from trusted standards validators.' -TestResultPath evidence/ci-test-results.json -ArtifactPath $artifacts -CommandsExecuted @('Reusable governance validation') -CommandsNotExecuted @('Final workflow enforcement had not completed when preliminary evidence was generated.') -ValidatedCommitSha $env:CALLER_COMMIT_SHA -Repository $env:CALLER_REPOSITORY -Branch $env:CALLER_REF_NAME -StandardsRepository $env:STANDARDS_REPOSITORY -StandardsWorkflowSha $env:STANDARDS_WORKFLOW_SHA -ValidationProfile $aggregate.validationProfile -ChecksExecuted @($aggregate.checksExecuted)
          'evidence-path=evidence/completion-result.json' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate completion evidence
        id: evidence_validation
        if: always()
        continue-on-error: true
        shell: pwsh
        env:
          CALLER_COMMIT_SHA: ${{ github.sha }}
        run: pwsh -NoProfile -File standards/actions/validate-evidence/Invoke-EvidenceValidation.ps1 -Path . -EvidencePath evidence/completion-result.json -ExpectedCommitSha $env:CALLER_COMMIT_SHA -OutputJson evidence/evidence-validation.json

      - name: Normalize final evidence inputs
        id: normalize_evidence_final
        if: always()
        shell: pwsh
        run: pwsh -NoProfile -File standards/scripts/Normalize-EvidencePaths.ps1 -Path . -EvidencePath evidence

      - name: Finalize workflow test evidence
        id: test_evidence_final
        if: always()
        shell: pwsh
        run: |
          $githubOutcome = if ('${{ steps.setup_python.outcome }}' -eq 'success' -and '${{ steps.setup_node.outcome }}' -eq 'success' -and '${{ steps.setup_dotnet.outcome }}' -eq 'success' -and '${{ steps.runtime.outcome }}' -eq 'success' -and '${{ steps.governance_validation.outcome }}' -eq 'success' -and '${{ steps.dependencies.outcome }}' -eq 'success') { 'success' } else { 'failure' }
          $outcomes = @{ evidence_validation='${{ steps.evidence_validation.outcome }}'; github_execution=$githubOutcome }
          $reports = @{ evidence_validation='evidence/evidence-validation.json'; github_execution='evidence/environment.json' }
          & ./standards/scripts/New-WorkflowTestEvidence.ps1 -RepositoryPath . -OutputPath evidence/ci-test-results.json -AggregateReportPath evidence/governance-validation.json -Outcomes $outcomes -Reports $reports -Runtime 'GitHub Actions ubuntu-24.04 / pinned pwsh' -ToolVersion $PSVersionTable.PSVersion.ToString()

      - name: Generate final completion evidence
        id: evidence_final
        if: always()
        shell: pwsh
        env:
          STANDARDS_REPOSITORY: ${{ job.workflow_repository }}
          STANDARDS_WORKFLOW_SHA: ${{ job.workflow_sha }}
          CALLER_REPOSITORY: ${{ github.repository }}
          CALLER_COMMIT_SHA: ${{ github.sha }}
          CALLER_REF_NAME: ${{ github.ref_name }}
          GOVERNANCE_VERSION: ${{ inputs.governance-version }}
        run: |
          $aggregate = Get-Content -LiteralPath evidence/governance-validation.json -Raw | ConvertFrom-Json
          $artifacts = @('evidence/environment.json','evidence/runtime-bootstrap.json','evidence/dependencies.json','evidence/validator-sbom.cdx.json','evidence/governance-validation.json','evidence/ci-test-results.json','evidence/evidence-validation.json')
          $artifacts += @(@('evidence/pester-summary.json','evidence/pester-details.json','evidence/python-static-analysis.json','evidence/bash-static-analysis.json') | Where-Object { Test-Path -LiteralPath $_ -PathType Leaf })
          & ./standards/scripts/New-CompletionEvidence.ps1 -RepositoryPath . -SourceRepositoryPath ./caller -OutputPath evidence/completion-result.json -GovernanceVersion $env:GOVERNANCE_VERSION -RiskClassification $aggregate.riskClassification -ExecutionContext GitHubActions -ArtifactName 'governance-evidence-${{ github.run_id }}' -Summary 'Reusable governance workflow generated final caller evidence from trusted standards validators.' -TestResultPath evidence/ci-test-results.json -ArtifactPath $artifacts -CommandsExecuted @('Reusable governance validation') -CommandsNotExecuted @() -ValidatedCommitSha $env:CALLER_COMMIT_SHA -Repository $env:CALLER_REPOSITORY -Branch $env:CALLER_REF_NAME -StandardsRepository $env:STANDARDS_REPOSITORY -StandardsWorkflowSha $env:STANDARDS_WORKFLOW_SHA -ValidationProfile $aggregate.validationProfile -ChecksExecuted @($aggregate.checksExecuted)
          'evidence-path=evidence/completion-result.json' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate final completion evidence
        id: final_evidence_validation
        if: always()
        continue-on-error: true
        shell: pwsh
        env:
          CALLER_COMMIT_SHA: ${{ github.sha }}
        run: pwsh -NoProfile -File standards/actions/validate-evidence/Invoke-EvidenceValidation.ps1 -Path . -EvidencePath evidence/completion-result.json -ExpectedCommitSha $env:CALLER_COMMIT_SHA -OutputJson evidence/evidence-validation-final.json

      - name: Upload governance evidence
        id: upload-artifact
        if: always()
        # actions/upload-artifact v4.6.2 pinned by commit SHA.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: governance-evidence-${{ github.run_id }}
          path: evidence/
          if-no-files-found: error
          retention-days: ${{ steps.inputs.outputs.artifact-retention-days }}

      - name: Record artifact output
        id: artifact
        if: always()
        shell: pwsh
        run: '"artifact-name=governance-evidence-${{ github.run_id }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append'

      - name: Enforce mandatory governance result
        id: enforcement
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path -LiteralPath evidence/ci-test-results.json -PathType Leaf)) { throw 'Mandatory workflow test evidence was not generated.' }
          $tests = @(Get-Content -LiteralPath evidence/ci-test-results.json -Raw | ConvertFrom-Json)
          $bad = @($tests | Where-Object { $_.status -in @('Failed','Blocked','NotRun') })
          if ('${{ steps.final_evidence_validation.outcome }}' -ne 'success') { throw 'Final completion evidence validation failed.' }
          if ($bad.Count -gt 0) {
            $bad | ForEach-Object { Write-Error "$($_.name): $($_.status) - $($_.failureReason)" }
            throw "$($bad.Count) mandatory governance checks failed, were blocked, or did not run."
          }
          Write-Output 'Mandatory governance enforcement passed.'
