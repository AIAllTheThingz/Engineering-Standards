name: Reusable Governance CI

on:
  workflow_call:
    inputs:
      project-path:
        description: Repository-relative path to validate. Path traversal and absolute paths are rejected.
        type: string
        required: false
        default: .
      governance-version:
        description: Expected governance standard version. Compared with project-manifest.json when present.
        type: string
        required: false
        default: 1.0.0
      run-examples:
        description: Compatibility input. Examples are mandatory for this repository and cannot be disabled.
        type: boolean
        required: false
        default: true
      run-pester:
        description: Compatibility input. Pester is mandatory for this repository and cannot be disabled.
        type: boolean
        required: false
        default: true
      run-documentation-validation:
        description: Compatibility input. Documentation validation is mandatory for this repository and cannot be disabled.
        type: boolean
        required: false
        default: true
      artifact-retention-days:
        description: Retention period for governance evidence artifacts. Valid range is 1 through 90 days.
        type: number
        required: false
        default: 30
      controlled-failure-test:
        description: Safe repository-owned failure path proving evidence upload and final enforcement behavior.
        type: boolean
        required: false
        default: false
    outputs:
      evidence-path:
        description: Completion evidence path.
        value: ${{ jobs.governance.outputs.evidence-path }}
      artifact-name:
        description: Uploaded artifact name.
        value: ${{ jobs.governance.outputs.artifact-name }}

permissions:
  contents: read

jobs:
  governance:
    name: Governance validation
    runs-on: ubuntu-latest
    outputs:
      evidence-path: ${{ steps.evidence_final.outputs.evidence-path }}
      artifact-name: ${{ steps.artifact.outputs.artifact-name }}
    steps:
      - name: Checkout
        # actions/checkout v4.2.2 pinned by commit SHA.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Validate workflow inputs
        id: inputs
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $projectPath = '${{ inputs.project-path }}'
          if ([string]::IsNullOrWhiteSpace($projectPath)) { throw 'project-path must not be empty.' }
          if ([System.IO.Path]::IsPathRooted($projectPath) -or $projectPath -match '(^|[\\/])\.\.([\\/]|$)') {
            throw "Invalid project-path '$projectPath'. Absolute paths and path traversal are not allowed."
          }
          foreach ($mandatory in @(
            @{ name = 'run-examples'; value = '${{ inputs.run-examples }}' },
            @{ name = 'run-pester'; value = '${{ inputs.run-pester }}' },
            @{ name = 'run-documentation-validation'; value = '${{ inputs.run-documentation-validation }}' }
          )) {
            if ($mandatory.value -ne 'true') {
              throw "$($mandatory.name) cannot disable a mandatory governance check for this repository without an approved exception."
            }
          }
          $resolved = [System.IO.Path]::GetFullPath((Join-Path $PWD.Path $projectPath))
          if (-not $resolved.StartsWith($PWD.Path, [System.StringComparison]::OrdinalIgnoreCase)) {
            throw "Invalid project-path '$projectPath'. It resolves outside the repository."
          }
          $retention = [int]'${{ inputs.artifact-retention-days }}'
          if ($retention -lt 1 -or $retention -gt 90) { throw 'artifact-retention-days must be between 1 and 90.' }
          if (Test-Path -LiteralPath (Join-Path $resolved 'project-manifest.json') -PathType Leaf) {
            $manifest = Get-Content -LiteralPath (Join-Path $resolved 'project-manifest.json') -Raw | ConvertFrom-Json
            if ($manifest.governanceVersion -ne '${{ inputs.governance-version }}') {
              throw "governance-version input '${{ inputs.governance-version }}' does not match project manifest version '$($manifest.governanceVersion)'."
            }
          }
          New-Item -ItemType Directory -Path evidence -Force | Out-Null
          "project-path=$projectPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "artifact-retention-days=$retention" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Record environment information
        id: environment
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path evidence -Force | Out-Null
          [ordered]@{
            repository = '${{ github.repository }}'
            sha = '${{ github.sha }}'
            ref = '${{ github.ref }}'
            refName = '${{ github.ref_name }}'
            runId = '${{ github.run_id }}'
            runAttempt = '${{ github.run_attempt }}'
            workflow = '${{ github.workflow }}'
            runnerOs = '${{ runner.os }}'
            governanceVersion = '${{ inputs.governance-version }}'
            powerShellVersion = $PSVersionTable.PSVersion.ToString()
            projectPath = '${{ steps.inputs.outputs.project-path }}'
          } | ConvertTo-Json -Depth 10 | Set-Content -LiteralPath evidence/environment.json -Encoding utf8

      - name: Install pinned validation dependencies
        id: dependencies
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $status = 'Passed'
          $failure = $null
          $module = $null
          try {
            python -m pip install --disable-pip-version-check --no-input --require-hashes -r .github/dependencies/workflow-validation-requirements.txt
            Install-Module PSScriptAnalyzer -RequiredVersion 1.22.0 -Scope CurrentUser -Force -Repository PSGallery
            $module = Get-Module PSScriptAnalyzer -ListAvailable | Sort-Object Version -Descending | Select-Object -First 1
            if (-not $module -or $module.Version.ToString() -ne '1.22.0') {
              throw "PSScriptAnalyzer 1.22.0 was required but '$($module.Version)' was installed."
            }
          }
          catch {
            $status = 'Failed'
            $failure = $_.Exception.Message
          }
          [ordered]@{
            pythonRequirement = 'PyYAML==6.0.2'
            pythonInstall = 'pip --require-hashes'
            powershellRepository = 'PSGallery'
            psscriptAnalyzerVersion = if ($module) { $module.Version.ToString() } else { $null }
            status = $status
            failureReason = $failure
            installedAtUtc = (Get-Date).ToUniversalTime().ToString('o')
          } | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath evidence/dependencies.json -Encoding utf8
          if ($status -ne 'Passed') { throw $failure }

      - name: Validate YAML syntax
        id: yaml
        continue-on-error: true
        shell: pwsh
        run: pwsh -NoProfile -File scripts/Test-YamlSyntax.ps1 -Path . -OutputJson evidence/yaml-syntax.json

      - name: Validate workflow architecture
        id: workflow_architecture
        continue-on-error: true
        shell: pwsh
        run: pwsh -NoProfile -File scripts/Test-GitHubWorkflowArchitecture.ps1 -Path . -DefaultBranch master -OutputJson evidence/workflow-architecture.json

      - name: Validate schemas and fixtures
        id: json_schemas
        continue-on-error: true
        shell: pwsh
        run: pwsh -NoProfile -File scripts/Test-JsonSchemas.ps1 -Path '${{ steps.inputs.outputs.project-path }}' -OutputJson evidence/json-schemas.json

      - name: Validate Markdown links
        id: markdown_links
        continue-on-error: true
        shell: pwsh
        run: |
          pwsh -NoProfile -File scripts/Test-MarkdownLinks.ps1 -Path '${{ steps.inputs.outputs.project-path }}' -OutputJson evidence/markdown-links.json
          if ('${{ inputs.controlled-failure-test }}' -eq 'true') {
            throw 'Controlled failure test intentionally fails Markdown link validation after producing its report.'
          }

      - name: Validate documentation completeness
        id: documentation
        continue-on-error: true
        shell: pwsh
        run: pwsh -NoProfile -File scripts/Test-DocumentationCompleteness.ps1 -Path '${{ steps.inputs.outputs.project-path }}' -OutputJson evidence/documentation-completeness.json

      - name: Validate governance contract
        id: contract
        continue-on-error: true
        shell: pwsh
        run: pwsh -NoProfile -File actions/validate-contract/Invoke-ContractValidation.ps1 -Path '${{ steps.inputs.outputs.project-path }}' -OutputJson evidence/contract.json

      - name: Run forbidden-pattern scan
        id: forbidden_patterns
        continue-on-error: true
        shell: pwsh
        run: pwsh -NoProfile -File actions/forbidden-pattern-scan/Invoke-ForbiddenPatternScan.ps1 -Path '${{ steps.inputs.outputs.project-path }}' -OutputJson evidence/forbidden-patterns.json

      - name: Validate repository health
        id: repository_health
        continue-on-error: true
        shell: pwsh
        run: pwsh -NoProfile -File actions/repository-health/Invoke-RepositoryHealth.ps1 -Path '${{ steps.inputs.outputs.project-path }}' -OutputJson evidence/repository-health.json

      - name: Validate PowerShell parser
        id: powershell_parser
        continue-on-error: true
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -LiteralPath '${{ steps.inputs.outputs.project-path }}' -Recurse -File -Include *.ps1,*.psm1,*.psd1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $failed = $true
              Write-Error "Parse errors in $($_.FullName): $($errors | Out-String)"
            }
          }
          if ($failed) { exit 1 }
          @{ parsedAtUtc = (Get-Date).ToUniversalTime().ToString('o'); status = 'Passed' } | ConvertTo-Json | Set-Content evidence/powershell-parser.json

      - name: Run Pester
        id: pester
        continue-on-error: true
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests'
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'evidence/pester-results.xml'
          $config.TestResult.OutputFormat = 'NUnitXml'
          $config.Run.PassThru = $true
          $result = Invoke-Pester -Configuration $config
          $result | Select-Object Result,PassedCount,FailedCount,SkippedCount,NotRunCount,Duration | ConvertTo-Json -Depth 10 | Set-Content evidence/pester-summary.json
          if ($result.FailedCount -gt 0) { exit 1 }

      - name: Run PSScriptAnalyzer
        id: psscriptanalyzer
        continue-on-error: true
        shell: pwsh
        run: |
          $findings = @(Invoke-ScriptAnalyzer -Path '${{ steps.inputs.outputs.project-path }}' -Recurse -Severity Error)
          if ($findings.Count -eq 0) {
            '[]' | Set-Content -LiteralPath evidence/psscriptanalyzer.json -Encoding utf8
          } else {
            $findings | ConvertTo-Json -Depth 20 | Set-Content -LiteralPath evidence/psscriptanalyzer.json -Encoding utf8
            $findings | Format-Table -AutoSize
            exit 1
          }

      - name: Validate examples
        id: examples
        continue-on-error: true
        shell: pwsh
        run: |
          pwsh -NoProfile -File examples/powershell-project/tools/Test-Example.ps1
          pwsh -NoProfile -File examples/database-project/tools/Test-Migrations.ps1 -Path examples/database-project
          Invoke-Pester -Path examples/worker-service-project/tests -Output Detailed
          dotnet build examples/dotnet-project/Example.Service.csproj --configuration Release
          dotnet build examples/dotnet-project/src/Example.csproj --configuration Release
          dotnet run --project examples/dotnet-project/tests/Example.Service.Tests.csproj --configuration Release
          npm ci --prefix examples/web-project
          npm run lint --prefix examples/web-project
          npm test --prefix examples/web-project
          npm run build --prefix examples/web-project
          @{ validatedAtUtc = (Get-Date).ToUniversalTime().ToString('o'); status = 'Passed' } | ConvertTo-Json | Set-Content evidence/examples.json

      - name: Generate workflow test evidence
        id: test_evidence_initial
        if: always()
        shell: pwsh
        run: |
          $outcomes = @{
            yaml='${{ steps.yaml.outcome }}'
            workflow_architecture='${{ steps.workflow_architecture.outcome }}'
            json_schemas='${{ steps.json_schemas.outcome }}'
            markdown_links='${{ steps.markdown_links.outcome }}'
            documentation='${{ steps.documentation.outcome }}'
            contract='${{ steps.contract.outcome }}'
            forbidden_patterns='${{ steps.forbidden_patterns.outcome }}'
            repository_health='${{ steps.repository_health.outcome }}'
            powershell_parser='${{ steps.powershell_parser.outcome }}'
            pester='${{ steps.pester.outcome }}'
            psscriptanalyzer='${{ steps.psscriptanalyzer.outcome }}'
            examples='${{ steps.examples.outcome }}'
            evidence_validation='NotRun'
            github_execution='success'
          }
          & ./scripts/New-WorkflowTestEvidence.ps1 -RepositoryPath . -OutputPath evidence/ci-test-results.json -Outcomes $outcomes -RunPester -RunDocumentation -RunExamples -Runtime 'GitHub Actions ubuntu-latest / pwsh' -ToolVersion $PSVersionTable.PSVersion.ToString() -AllowControlledFailure:('${{ inputs.controlled-failure-test }}' -eq 'true')

      - name: Generate completion evidence
        id: evidence_initial
        if: always()
        shell: pwsh
        run: |
          $artifactPaths = @(
            'evidence/environment.json',
            'evidence/dependencies.json',
            'evidence/yaml-syntax.json',
            'evidence/workflow-architecture.json',
            'evidence/json-schemas.json',
            'evidence/markdown-links.json',
            'evidence/documentation-completeness.json',
            'evidence/contract.json',
            'evidence/forbidden-patterns.json',
            'evidence/repository-health.json',
            'evidence/powershell-parser.json',
            'evidence/pester-results.xml',
            'evidence/pester-summary.json',
            'evidence/psscriptanalyzer.json',
            'evidence/examples.json',
            'evidence/ci-test-results.json'
          )
          & ./scripts/New-CompletionEvidence.ps1 -RepositoryPath . -OutputPath evidence/completion-result.json -GovernanceVersion '${{ inputs.governance-version }}' -RiskClassification High -Summary 'GitHub Actions governance validation generated completion evidence from individual workflow test records.' -TestResultPath evidence/ci-test-results.json -ArtifactPath $artifactPaths -CommandsExecuted @('Governance CI reusable workflow') -CommandsNotExecuted @()
          "evidence-path=evidence/completion-result.json" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate completion evidence
        id: evidence_validation
        if: always()
        continue-on-error: true
        shell: pwsh
        run: pwsh -NoProfile -File actions/validate-evidence/Invoke-EvidenceValidation.ps1 -Path . -EvidencePath evidence/completion-result.json -ExpectedCommitSha '${{ github.sha }}' -OutputJson evidence/evidence-validation.json

      - name: Finalize workflow test evidence
        id: test_evidence_final
        if: always()
        shell: pwsh
        run: |
          $outcomes = @{
            yaml='${{ steps.yaml.outcome }}'
            workflow_architecture='${{ steps.workflow_architecture.outcome }}'
            json_schemas='${{ steps.json_schemas.outcome }}'
            markdown_links='${{ steps.markdown_links.outcome }}'
            documentation='${{ steps.documentation.outcome }}'
            contract='${{ steps.contract.outcome }}'
            forbidden_patterns='${{ steps.forbidden_patterns.outcome }}'
            repository_health='${{ steps.repository_health.outcome }}'
            powershell_parser='${{ steps.powershell_parser.outcome }}'
            pester='${{ steps.pester.outcome }}'
            psscriptanalyzer='${{ steps.psscriptanalyzer.outcome }}'
            examples='${{ steps.examples.outcome }}'
            evidence_validation='${{ steps.evidence_validation.outcome }}'
            github_execution='success'
          }
          & ./scripts/New-WorkflowTestEvidence.ps1 -RepositoryPath . -OutputPath evidence/ci-test-results.json -Outcomes $outcomes -RunPester -RunDocumentation -RunExamples -Runtime 'GitHub Actions ubuntu-latest / pwsh' -ToolVersion $PSVersionTable.PSVersion.ToString() -AllowControlledFailure:('${{ inputs.controlled-failure-test }}' -eq 'true')

      - name: Generate final completion evidence
        id: evidence_final
        if: always()
        shell: pwsh
        run: |
          $artifactPaths = @(
            'evidence/environment.json',
            'evidence/dependencies.json',
            'evidence/yaml-syntax.json',
            'evidence/workflow-architecture.json',
            'evidence/json-schemas.json',
            'evidence/markdown-links.json',
            'evidence/documentation-completeness.json',
            'evidence/contract.json',
            'evidence/forbidden-patterns.json',
            'evidence/repository-health.json',
            'evidence/powershell-parser.json',
            'evidence/pester-results.xml',
            'evidence/pester-summary.json',
            'evidence/psscriptanalyzer.json',
            'evidence/examples.json',
            'evidence/ci-test-results.json',
            'evidence/evidence-validation.json'
          )
          & ./scripts/New-CompletionEvidence.ps1 -RepositoryPath . -OutputPath evidence/completion-result.json -GovernanceVersion '${{ inputs.governance-version }}' -RiskClassification High -Summary 'GitHub Actions governance validation generated final completion evidence from individual workflow test records.' -TestResultPath evidence/ci-test-results.json -ArtifactPath $artifactPaths -CommandsExecuted @('Governance CI reusable workflow') -CommandsNotExecuted @()
          "evidence-path=evidence/completion-result.json" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate final completion evidence
        id: final_evidence_validation
        if: always()
        continue-on-error: true
        shell: pwsh
        run: pwsh -NoProfile -File actions/validate-evidence/Invoke-EvidenceValidation.ps1 -Path . -EvidencePath evidence/completion-result.json -ExpectedCommitSha '${{ github.sha }}' -OutputJson evidence/evidence-validation-final.json

      - name: Upload governance evidence
        id: upload-artifact
        if: always()
        # actions/upload-artifact v4.6.2 pinned by commit SHA.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: governance-evidence-${{ github.run_id }}
          path: evidence/
          if-no-files-found: error
          retention-days: ${{ steps.inputs.outputs.artifact-retention-days }}

      - name: Record artifact output
        id: artifact
        if: always()
        shell: pwsh
        run: |
          "artifact-name=governance-evidence-${{ github.run_id }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Enforce mandatory governance result
        id: enforcement
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path -LiteralPath evidence/ci-test-results.json -PathType Leaf)) {
            throw 'Mandatory workflow test evidence was not generated.'
          }
          $tests = @(Get-Content -LiteralPath evidence/ci-test-results.json -Raw | ConvertFrom-Json)
          $bad = @($tests | Where-Object { $_.status -in @('Failed','Blocked','NotRun') })
          if ('${{ steps.final_evidence_validation.outcome }}' -ne 'success') {
            throw 'Final completion evidence validation failed.'
          }
          if ($bad.Count -gt 0) {
            $bad | ForEach-Object { Write-Error "$($_.name): $($_.status) - $($_.failureReason)" }
            throw "$($bad.Count) mandatory governance checks failed, were blocked, or did not run."
          }
          Write-Output 'Mandatory governance enforcement passed.'
