name: Candidate Governance Implementation

on:
  workflow_call:

permissions:
  contents: read

jobs:
  candidate:
    name: Candidate implementation validation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout candidate implementation
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: candidate
          persist-credentials: false
          fetch-depth: 0

      - name: Validate candidate harness identity
        shell: pwsh
        env:
          CALLER_REPOSITORY: ${{ github.repository }}
          HARNESS_REPOSITORY: ${{ job.workflow_repository }}
          HARNESS_SHA: ${{ job.workflow_sha }}
          CANDIDATE_SHA: ${{ github.sha }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:CALLER_REPOSITORY -ne 'AIAllTheThingz/Engineering-Standards') { throw 'Candidate validation is restricted to the Engineering Standards repository.' }
          if ($env:HARNESS_REPOSITORY -ne 'AIAllTheThingz/Engineering-Standards') { throw 'Unexpected candidate harness repository.' }
          if ($env:HARNESS_SHA -notmatch '^[a-fA-F0-9]{40}$') { throw 'Candidate harness must execute from an immutable full SHA.' }
          if ($env:CANDIDATE_SHA -notmatch '^[a-fA-F0-9]{40}$') { throw 'Candidate checkout must use an immutable full SHA.' }
          $head = (& git -C candidate rev-parse HEAD).Trim()
          if ($LASTEXITCODE -ne 0 -or $head -ne $env:CANDIDATE_SHA) { throw 'Candidate checkout HEAD does not match github.sha.' }

      - name: Install immutable candidate-validation dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $requirements = Join-Path $env:RUNNER_TEMP 'candidate-validation-requirements.txt'
          'PyYAML==6.0.2 --hash=sha256:80bab7bfc629882493af4aa31a4cfa43a4c57c83813253626916b8c7ada83476' | Set-Content -LiteralPath $requirements -Encoding utf8
          python -m pip install --disable-pip-version-check --no-input --require-hashes -r $requirements
          if ($LASTEXITCODE -ne 0) { throw 'Pinned PyYAML installation failed.' }

          $packagePath = Join-Path $env:RUNNER_TEMP 'PSScriptAnalyzer.1.22.0.nupkg'
          $expectedHash = '71bfb9eb58e19d4b662f4494a7d572a724b60e0588848dcff34195a0e08ae1be'
          Invoke-WebRequest -Uri 'https://www.powershellgallery.com/api/v2/package/PSScriptAnalyzer/1.22.0' -OutFile $packagePath -UseBasicParsing
          $actualHash = (Get-FileHash -LiteralPath $packagePath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) { throw "PSScriptAnalyzer package hash mismatch. Expected $expectedHash but received $actualHash." }
          $moduleParent = Join-Path $env:RUNNER_TEMP 'candidate-psmodules'
          $moduleRoot = Join-Path $moduleParent 'PSScriptAnalyzer/1.22.0'
          New-Item -ItemType Directory -Path $moduleRoot -Force | Out-Null
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::ExtractToDirectory($packagePath, $moduleRoot, $true)
          $env:PSModulePath = $moduleParent + [System.IO.Path]::PathSeparator + $env:PSModulePath
          "PSModulePath=$($env:PSModulePath)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $module = Import-Module (Join-Path $moduleRoot 'PSScriptAnalyzer.psd1') -Force -PassThru
          if (-not $module -or $module.Version.ToString() -ne '1.22.0') { throw 'Required PSScriptAnalyzer 1.22.0 was not installed.' }

      - name: Run candidate implementation validation
        shell: pwsh
        working-directory: candidate
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          CANDIDATE_SHA: ${{ github.sha }}
          HARNESS_SHA: ${{ job.workflow_sha }}
        run: |
          $ErrorActionPreference = 'Stop'
          $commandMarker = 'candidate-' + [guid]::NewGuid().ToString('N')
          Write-Output "::stop-commands::$commandMarker"
          try {
            $root = (Resolve-Path .).Path
            $reportRoot = Join-Path $root '.tmp/candidate-validation'
            New-Item -ItemType Directory -Path $reportRoot -Force | Out-Null

            function Invoke-CandidateScript {
              param([Parameter(Mandatory)][string]$RelativePath, [string[]]$Arguments = @())
              & pwsh -NoProfile -File (Join-Path $root $RelativePath) @Arguments
              if ($LASTEXITCODE -ne 0) { throw "Candidate command '$RelativePath' failed with exit code $LASTEXITCODE." }
            }

            $baseSha = $env:BASE_SHA
            if ($baseSha -notmatch '^[a-fA-F0-9]{40}$' -or $baseSha -match '^0{40}$') {
              $baseSha = (& git rev-parse "$($env:CANDIDATE_SHA)^" 2>$null).Trim()
            }
            if ($baseSha -notmatch '^[a-fA-F0-9]{40}$') { throw 'A valid base SHA is required for candidate diff validation.' }
            & git diff --check "$baseSha...$($env:CANDIDATE_SHA)"
            if ($LASTEXITCODE -ne 0) { throw 'Candidate git diff check failed.' }

            $parseErrors = [System.Collections.Generic.List[string]]::new()
            foreach ($relativePath in @(& git ls-files -- '*.ps1' '*.psm1' '*.psd1')) {
              $tokens = $null
              $errors = $null
              [System.Management.Automation.Language.Parser]::ParseFile((Join-Path $root $relativePath), [ref]$tokens, [ref]$errors) | Out-Null
              foreach ($errorRecord in @($errors)) { $parseErrors.Add("${relativePath}: $($errorRecord.Message)") }
            }
            if ($parseErrors.Count -gt 0) { throw "Candidate PowerShell parser failures:`n$($parseErrors -join [Environment]::NewLine)" }

            Invoke-CandidateScript 'scripts/Test-AgentStandards.ps1' @('-Path',$root)
            Invoke-CandidateScript 'scripts/Test-YamlSyntax.ps1' @('-Path',$root,'-OutputJson',(Join-Path $reportRoot 'yaml-syntax.json'))
            Invoke-CandidateScript 'scripts/Test-GitHubWorkflowArchitecture.ps1' @('-Path',$root,'-DefaultBranch','master','-ExpectedReusableWorkflowSha',$env:HARNESS_SHA,'-RequireCandidateValidation','-OutputJson',(Join-Path $reportRoot 'workflow-architecture.json'))
            Invoke-CandidateScript 'scripts/Test-JsonSchemas.ps1' @('-Path',$root,'-OutputJson',(Join-Path $reportRoot 'json-schemas.json'))
            Invoke-CandidateScript 'scripts/Test-MarkdownLinks.ps1' @('-Path',$root,'-OutputJson',(Join-Path $reportRoot 'markdown-links.json'))
            Invoke-CandidateScript 'scripts/Test-DocumentationCompleteness.ps1' @('-Path',$root,'-OutputJson',(Join-Path $reportRoot 'documentation-completeness.json'))
            Invoke-CandidateScript 'actions/validate-contract/Invoke-ContractValidation.ps1' @('-Path',$root,'-OutputJson',(Join-Path $reportRoot 'contract.json'))
            Invoke-CandidateScript 'actions/repository-health/Invoke-RepositoryHealth.ps1' @('-Path',$root,'-RepositoryOwnerType','User','-OutputJson',(Join-Path $reportRoot 'repository-health.json'))
            Invoke-CandidateScript 'actions/forbidden-pattern-scan/Invoke-ForbiddenPatternScan.ps1' @('-Path',$root,'-OutputJson',(Join-Path $reportRoot 'forbidden-patterns.json'))
            Invoke-CandidateScript 'scripts/Invoke-PesterSuite.ps1' @('-EvidenceRoot',(Join-Path $reportRoot 'pester'))

            $analyzerFindings = @(Invoke-ScriptAnalyzer -Path $root -Recurse -Severity Error)
            if ($analyzerFindings.Count -gt 0) { throw "Candidate PSScriptAnalyzer error findings:`n$($analyzerFindings | Out-String)" }
            Invoke-CandidateScript 'scripts/Test-Examples.ps1'
          }
          finally {
            Write-Output "::$commandMarker::"
          }
