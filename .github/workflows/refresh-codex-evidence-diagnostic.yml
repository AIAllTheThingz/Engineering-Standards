name: Refresh Codex Evidence Diagnostic

on:
  push:
    branches:
      - agent/base-simplicity-runtime-validation

permissions:
  contents: read

jobs:
  refresh:
    name: Generate refreshed blocked evidence
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout candidate branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Recompute blocked evidence bindings
        shell: pwsh
        env:
          EVALUATED_COMMIT_SHA: ${{ github.sha }}
        run: |
          $ErrorActionPreference = 'Stop'
          Import-Module ./scripts/CodexSkillBehaviorEvaluation.psm1 -Force
          $stored = Get-Content -LiteralPath ./evidence/codex-skill-behavior.json -Raw | ConvertFrom-Json
          $storedForProvider = $stored
          $provider = {
            param($case, $index, $config)
            $storedCase = @($storedForProvider.caseOutcomes | Where-Object caseId -eq $case.caseId)
            if ($storedCase.Count -ne 1) {
              return [pscustomobject]@{ status = 'Blocked'; failureReason = 'The stored case identity is missing or duplicated.' }
            }
            $sample = @($storedCase[0].samples | Where-Object sampleIndex -eq $index)
            if ($sample.Count -ne 1) {
              return [pscustomobject]@{ status = 'Blocked'; failureReason = 'The stored sample identity is missing or duplicated.' }
            }
            $sample[0]
          }.GetNewClosure()
          $refreshed = Invoke-CodexSkillBehaviorEvaluation `
            -Path . `
            -ObservationProvider $provider `
            -ExecutionMode $stored.executionMode `
            -RunnerVersion $stored.model.runnerVersion `
            -EvaluatedCommitSha $env:EVALUATED_COMMIT_SHA
          if ($refreshed.status -cne 'Blocked') { throw 'The refreshed evidence must remain honestly Blocked.' }
          New-Item -ItemType Directory -Path .tmp/codex-evidence-refresh -Force | Out-Null
          $refreshed | ConvertTo-Json -Depth 32 |
            Set-Content -LiteralPath .tmp/codex-evidence-refresh/codex-skill-behavior.json -Encoding utf8

      - name: Upload refreshed evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: refreshed-codex-evidence-${{ github.run_id }}
          path: .tmp/codex-evidence-refresh/codex-skill-behavior.json
          if-no-files-found: error
          retention-days: 1
