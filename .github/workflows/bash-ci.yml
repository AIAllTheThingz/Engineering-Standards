name: Bash example CI

on:
  pull_request:
    paths:
      - '.github/workflows/bash-ci*.yml'
      - 'workflows/bash-ci.yml'
      - 'examples/bash-project/**'
      - 'scripts/Install-BashProjectToolchain.py'
      - 'scripts/bash-project-validation.py'
      - 'scripts/Normalize-BashFunctionalEvidence.py'
      - 'scripts/New-CompletionEvidence.ps1'
      - 'scripts/GovernanceValidation.psm1'
      - 'scripts/Test-BashWorkflowEvidenceArtifact.ps1'
      - 'actions/validate-evidence/Invoke-EvidenceValidation.ps1'
      - 'tests/bash/**'
      - 'tests/scripts/BashProjectSupport.Tests.ps1'
      - 'tests/scripts/BashExampleCleanup.Tests.ps1'
      - 'agents/AGENTS_Bash.md'
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
  push:
    branches: [master, agent/bash-first-class-project-support]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bash:
    name: Bash
    permissions:
      contents: read
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/bash-ci-reusable.yml@d55bb8e6778030f5490e900ba52ba99ac6403827
    with:
      project-path: examples/bash-project

  repair-candidate-validation:
    name: Repair candidate validation assertions
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: agent/bash-first-class-project-support
          fetch-depth: 0
          persist-credentials: true

      - name: Apply bounded repairs and restore workflow
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          cleanup = Path('tests/scripts/BashExampleCleanup.Tests.ps1')
          cleanup_text = cleanup.read_text(encoding='utf-8')
          old_cleanup = "$removeIndex = $script:wrapper.IndexOf('Remove-Item -LiteralPath $resolvedTemporary -Recurse -Force')"
          new_cleanup = "$removeIndex = $script:wrapper.IndexOf('& rm -rf -- $resolvedTemporary')"
          if cleanup_text.count(old_cleanup) != 1:
              raise SystemExit('Expected cleanup assertion anchor was not found exactly once.')
          cleanup.write_text(cleanup_text.replace(old_cleanup, new_cleanup), encoding='utf-8')

          support = Path('tests/scripts/BashProjectSupport.Tests.ps1')
          support_text = support.read_text(encoding='utf-8')
          old_scope = "            'scripts/Test-PythonStaticAnalysis.ps1',\n            'tests/scripts/BashProjectSupport.Tests.ps1'"
          new_scope = "            'scripts/Test-PythonStaticAnalysis.ps1',\n            'scripts/bash-project-validation.py',\n            'tests/scripts/BashProjectSupport.Tests.ps1'"
          if support_text.count(old_scope) != 1:
              raise SystemExit('Expected local evidence freshness scope anchor was not found exactly once.')
          support.write_text(support_text.replace(old_scope, new_scope), encoding='utf-8')

          Path('.github/workflows/bash-ci.yml').write_text("""name: Bash example CI

