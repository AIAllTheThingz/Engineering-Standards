""", encoding='utf-8')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/scripts/BashExampleCleanup.Tests.ps1 tests/scripts/BashProjectSupport.Tests.ps1 .github/workflows/bash-ci.yml
