name: Governance CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      controlled-failure-test:
        description: Run a safe mandatory-check failure to prove evidence upload on failure.
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: governance-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    name: Governance
    # Self-CI uses the reviewed Issue #15 implementation commit so pull-request
    # changes cannot redefine the validator checkout labeled as trusted.
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/governance-ci-reusable.yml@c118000cb2652bac4f35d4919d515458b776987c
    with:
      project-path: .
      governance-version: 1.1.0
      controlled-failure-test: ${{ inputs.controlled-failure-test || false }}

  candidate_implementation:
    name: Candidate implementation validation
    # This immutable harness supplies the security envelope, dependency pins,
    # and explicit commands while deliberately executing the candidate checkout.
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/governance-ci-candidate.yml@c118000cb2652bac4f35d4919d515458b776987c
