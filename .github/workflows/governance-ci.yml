name: Governance CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      controlled-failure-test:
        description: Run a safe mandatory-check failure to prove evidence upload on failure.
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: governance-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    name: Governance
    # Self-CI uses the frozen lifecycle-aware implementation commit so
    # pull-request changes cannot redefine the validator checkout labeled trusted.
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/governance-ci-reusable.yml@b6c85e1deb4685791db6cd8decd915a5f7477600
    with:
      project-path: .
      governance-version: 1.1.0
      controlled-failure-test: ${{ inputs.controlled-failure-test || false }}

  candidate_implementation:
    name: Candidate implementation validation
    # Keep the trusted baseline and candidate harness on the same frozen reviewed
    # commit, as required by the repository workflow-architecture contract.
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/governance-ci-candidate.yml@b6c85e1deb4685791db6cd8decd915a5f7477600

  evidence_refresh_diagnostic:
    name: Temporary evidence refresh diagnostic
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout pull-request branch head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Generate refreshed blocked Codex evidence
        shell: pwsh
        env:
          EVALUATED_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          $ErrorActionPreference = 'Stop'
          Import-Module ./scripts/CodexSkillBehaviorEvaluation.psm1 -Force
          $stored = Get-Content -LiteralPath ./evidence/codex-skill-behavior.json -Raw | ConvertFrom-Json
          $storedForProvider = $stored
          $provider = {
            param($case, $index, $config)
            $storedCase = @($storedForProvider.caseOutcomes | Where-Object caseId -eq $case.caseId)
            if ($storedCase.Count -ne 1) {
              return [pscustomobject]@{ status = 'Blocked'; failureReason = 'The stored case identity is missing or duplicated.' }
            }
            $sample = @($storedCase[0].samples | Where-Object sampleIndex -eq $index)
            if ($sample.Count -ne 1) {
              return [pscustomobject]@{ status = 'Blocked'; failureReason = 'The stored sample identity is missing or duplicated.' }
            }
            $sample[0]
          }.GetNewClosure()
          $refreshed = Invoke-CodexSkillBehaviorEvaluation `
            -Path . `
            -ObservationProvider $provider `
            -ExecutionMode $stored.executionMode `
            -RunnerVersion $stored.model.runnerVersion `
            -EvaluatedCommitSha $env:EVALUATED_COMMIT_SHA
          if ($refreshed.status -cne 'Blocked') { throw 'Refreshed evidence must remain honestly Blocked.' }
          New-Item -ItemType Directory -Path .tmp/codex-evidence-refresh -Force | Out-Null
          $refreshed | ConvertTo-Json -Depth 32 |
            Set-Content -LiteralPath .tmp/codex-evidence-refresh/codex-skill-behavior.json -Encoding utf8

      - name: Upload refreshed evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: refreshed-codex-evidence-${{ github.run_id }}
          path: .tmp/codex-evidence-refresh/codex-skill-behavior.json
          if-no-files-found: error
          retention-days: 1
