name: Governance CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      controlled-failure-test:
        description: Run a safe mandatory-check failure to prove evidence upload on failure.
        type: boolean
        required: false
        default: false
      run-examples:
        description: Run mandatory example-project validation.
        type: boolean
        required: false
        default: true
      run-pester:
        description: Run mandatory Pester validation.
        type: boolean
        required: false
        default: true
      run-documentation-validation:
        description: Run mandatory documentation validation.
        type: boolean
        required: false
        default: true

permissions:
  contents: read

concurrency:
  group: governance-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    name: Governance
    uses: ./.github/workflows/governance-ci-reusable.yml
    with:
      project-path: .
      governance-version: 1.1.0
      controlled-failure-test: ${{ inputs.controlled-failure-test || false }}
      run-examples: ${{ github.event_name != 'workflow_dispatch' || inputs.run-examples }}
      run-pester: ${{ github.event_name != 'workflow_dispatch' || inputs.run-pester }}
      run-documentation-validation: ${{ github.event_name != 'workflow_dispatch' || inputs.run-documentation-validation }}
