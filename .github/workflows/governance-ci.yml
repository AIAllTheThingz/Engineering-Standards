name: Governance CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      controlled-failure-test:
        description: Run a safe mandatory-check failure to prove evidence upload on failure.
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: governance-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    name: Governance
    uses: ./.github/workflows/governance-ci-reusable.yml
    with:
      project-path: .
      governance-version: 1.1.0
      controlled-failure-test: ${{ inputs.controlled-failure-test || false }}
