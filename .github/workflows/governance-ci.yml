name: Governance CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      controlled-failure-test:
        description: Run a safe mandatory-check failure to prove evidence upload on failure.
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: governance-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    name: Governance
    # Self-CI uses the frozen, reviewed Issue #21 implementation commit so
    # pull-request changes cannot redefine the validator checkout labeled trusted.
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/governance-ci-reusable.yml@a56b26b1c07a01f7c0b83fb013d0c15f1d344d5b
    with:
      project-path: .
      governance-version: 1.1.0
      controlled-failure-test: ${{ inputs.controlled-failure-test || false }}

  candidate_implementation:
    name: Candidate implementation validation
    # Keep the trusted baseline and candidate harness on the same frozen reviewed
    # commit, as required by the repository workflow-architecture contract.
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/governance-ci-candidate.yml@a56b26b1c07a01f7c0b83fb013d0c15f1d344d5b
