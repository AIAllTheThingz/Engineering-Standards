name: Governance CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      controlled-failure-test:
        description: Run a safe mandatory-check failure to prove evidence upload on failure.
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: governance-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    name: Governance
    # Self-CI uses the frozen lifecycle-aware implementation commit so
    # pull-request changes cannot redefine the validator checkout labeled trusted.
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/governance-ci-reusable.yml@b6c85e1deb4685791db6cd8decd915a5f7477600
    with:
      project-path: .
      governance-version: 1.1.0
      controlled-failure-test: ${{ inputs.controlled-failure-test || false }}

  candidate_implementation:
    name: Candidate implementation validation
    # Keep the trusted baseline and candidate harness on the same frozen reviewed
    # commit, as required by the repository workflow-architecture contract.
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/governance-ci-candidate.yml@b6c85e1deb4685791db6cd8decd915a5f7477600

  evidence_refresh_diagnostic:
    name: Temporary evidence refresh diagnostic
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout pull-request branch head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Patch stale evidence bindings without reserializing samples
        shell: pwsh
        env:
          EVALUATED_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          $ErrorActionPreference = 'Stop'
          Import-Module ./scripts/CodexSkillBehaviorEvaluation.psm1 -Force
          $root = (Resolve-Path .).Path
          $inputs = Get-CodexBehaviorInput -Path $root
          $authorityHash = Get-BoundedInputHash -Root $root -RelativePaths $inputs.AuthorityPaths
          $sourcePath = Join-Path $root 'evidence/codex-skill-behavior.json'
          $raw = Get-Content -LiteralPath $sourcePath -Raw
          $raw = [regex]::Replace(
            $raw,
            '"authorityHash"\s*:\s*"[a-f0-9]{64}"',
            ('"authorityHash": "{0}"' -f $authorityHash),
            1
          )
          $raw = [regex]::Replace(
            $raw,
            '"evaluatedCommitSha"\s*:\s*"[a-f0-9]{40}"',
            ('"evaluatedCommitSha": "{0}"' -f $env:EVALUATED_COMMIT_SHA),
            1
          )
          New-Item -ItemType Directory -Path .tmp/codex-evidence-refresh -Force | Out-Null
          $outputPath = Join-Path $root '.tmp/codex-evidence-refresh/codex-skill-behavior.json'
          Set-Content -LiteralPath $outputPath -Value $raw -Encoding utf8 -NoNewline
          $parsed = Get-Content -LiteralPath $outputPath -Raw | ConvertFrom-Json
          if ($parsed.status -cne 'Blocked' -or $parsed.authorityHash -cne $authorityHash -or $parsed.evaluatedCommitSha -cne $env:EVALUATED_COMMIT_SHA) {
            throw 'The raw evidence binding refresh did not produce the expected blocked record.'
          }

      - name: Upload refreshed evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: refreshed-codex-evidence-${{ github.run_id }}
          path: .tmp/codex-evidence-refresh/codex-skill-behavior.json
          if-no-files-found: error
          retention-days: 1
