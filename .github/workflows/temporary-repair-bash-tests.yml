name: Temporary repair Bash mutation tests

on:
  push:
    branches:
      - agent/bash-first-class-project-support

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: agent/bash-first-class-project-support
          fetch-depth: 0

      - name: Repair stale mutation assertions and remove temporary workflow
        shell: python
        run: |
          from pathlib import Path

          path = Path('tests/scripts/BashProjectSupport.Tests.ps1')
          text = path.read_text(encoding='utf-8')

          replacements = {
              "if: always() && steps.bootstrap.outcome == 'success' && steps.normalization.outcome == 'success'":
                  "if: always() && steps.bootstrap.outcome == 'success' && steps.regression.outcome == 'success' && steps.normalization.outcome == 'success'",
              "if: always() && steps.bootstrap.outcome == 'success' && steps.normalization.outcome == 'success' && steps.completion.outcome == 'success' && steps.evidence.outcome == 'success'":
                  "if: always() && steps.bootstrap.outcome == 'success' && steps.regression.outcome == 'success' && steps.normalization.outcome == 'success' && steps.completion.outcome == 'success' && steps.evidence.outcome == 'success'",
          }

          for old, new in replacements.items():
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected exactly one stale assertion for {old!r}, found {count}.')
              text = text.replace(old, new)

          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/temporary-repair-bash-tests.yml').unlink()

      - name: Commit repaired tests
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/scripts/BashProjectSupport.Tests.ps1 .github/workflows/temporary-repair-bash-tests.yml
          git commit -m 'fix(bash): align regression-gate mutation tests'
          git push origin HEAD:agent/bash-first-class-project-support
