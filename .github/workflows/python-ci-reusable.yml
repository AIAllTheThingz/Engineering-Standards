name: Governed Python CI reusable

on:
  workflow_call:
    inputs:
      project-path:
        type: string
        required: false
        default: .
      python-version:
        type: string
        required: false
        default: 3.12.11

permissions:
  contents: read

jobs:
  python:
    name: Python validation
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      PYTHONNOUSERSITE: "1"
      PYTHONSAFEPATH: "1"
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Checkout caller without credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          path: caller

      - name: Checkout immutable standards implementation
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: AIAllTheThingz/Engineering-Standards
          ref: ${{ job.workflow_sha }}
          persist-credentials: false
          path: standards

      - name: Reject unsafe project path
        shell: pwsh
        run: |
          $candidate = '${{ inputs.project-path }}'
          if ([IO.Path]::IsPathRooted($candidate) -or $candidate -match '(^|[\\/])\.\.([\\/]|$)') { throw 'project-path must be repository-relative without traversal.' }
          $root = (Resolve-Path -LiteralPath (Join-Path $env:GITHUB_WORKSPACE 'caller')).Path
          $project = (Resolve-Path -LiteralPath (Join-Path $root $candidate)).Path
          if ($project -eq $root -and $candidate -ne '.') { throw 'project-path resolved unexpectedly.' }
          if ((Get-Item -LiteralPath $project).LinkType) { throw 'project-path must not be a link.' }

      - name: Set up exact Python runtime
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: caller/${{ inputs.project-path }}/requirements-ci.lock

      - name: Install hash-locked binary toolchain
        working-directory: caller/${{ inputs.project-path }}
        run: "python -m pip install --no-input --only-binary=:all: --require-hashes --no-deps -r requirements-ci.lock"

      - name: Verify dependency closure
        working-directory: caller/${{ inputs.project-path }}
        run: python -m pip check

      - name: Run governed functional validation
        id: functional
        continue-on-error: true
        run: python standards/scripts/python-project-validation.py --project caller/${{ inputs.project-path }}

      - name: Normalize Python evidence paths
        if: always()
        shell: pwsh
        run: ./standards/scripts/Normalize-EvidencePaths.ps1 -Path caller -EvidencePath '${{ inputs.project-path }}/evidence'

      - name: Create completion evidence
        id: completion
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          $env:GIT_CEILING_DIRECTORIES = (Resolve-Path -LiteralPath 'caller/${{ inputs.project-path }}').Path
          ./standards/scripts/New-CompletionEvidence.ps1 -RepositoryPath 'caller/${{ inputs.project-path }}' -OutputPath 'evidence/local-completion-result.json' -TestResultPath 'evidence/local-test-results.json' -GovernanceVersion 1.1.0 -RiskClassification Moderate -Summary 'Governed Python static analysis, tests, type checking, dependency audit, build, archive inspection, installation, smoke test, and SBOM validation completed.' -CommandsExecuted @('python standards/scripts/python-project-validation.py --project caller/${{ inputs.project-path }}') -ArtifactPath @('evidence/python-tests.json','evidence/python-type-check.json','evidence/python-dependency-audit.json','evidence/python-build.json','evidence/python-project-sbom.cdx.json')

      - name: Validate Python completion evidence
        id: evidence
        if: always()
        continue-on-error: true
        shell: pwsh
        run: ./standards/actions/validate-evidence/Invoke-EvidenceValidation.ps1 -Path 'caller/${{ inputs.project-path }}' -EvidencePath 'evidence/local-completion-result.json'

      - name: Upload Python evidence before enforcement
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: python-evidence-${{ github.run_id }}
          path: caller/${{ inputs.project-path }}/evidence/
          if-no-files-found: error
          retention-days: 30

      - name: Enforce Python validation
        if: always()
        shell: pwsh
        run: |
          if ('${{ steps.functional.outcome }}' -ne 'success' -or '${{ steps.completion.outcome }}' -ne 'success' -or '${{ steps.evidence.outcome }}' -ne 'success') { throw 'Mandatory governed Python functional validation, completion generation, or evidence validation failed or was blocked.' }
