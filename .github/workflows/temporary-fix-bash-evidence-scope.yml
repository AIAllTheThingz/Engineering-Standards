name: Temporary fix Bash evidence freshness scope

on:
  pull_request:
  push:
    branches:
      - agent/bash-first-class-project-support

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Patch freshness allowlist and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          repo="$RUNNER_TEMP/repair-repo"
          git clone --quiet --no-tags --branch agent/bash-first-class-project-support \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$repo"
          cd "$repo"
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tests/scripts/BashProjectSupport.Tests.ps1')
          text = path.read_text(encoding='utf-8')
          old = """            'examples/bash-project/.github/workflows/governance.yml',
            'tests/scripts/BashProjectSupport.Tests.ps1'
"""
          new = """            'examples/bash-project/.github/workflows/governance.yml',
            'scripts/Test-PythonStaticAnalysis.ps1',
            'tests/scripts/BashProjectSupport.Tests.ps1'
"""
          if text.count(old) != 1:
              raise SystemExit('Expected freshness allowlist anchor was not found exactly once.')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          rm -f .github/workflows/temporary-fix-bash-evidence-scope.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/scripts/BashProjectSupport.Tests.ps1 .github/workflows/temporary-fix-bash-evidence-scope.yml
          git diff --cached --quiet && { echo 'Expected scope change was not produced.' >&2; exit 1; }
          git commit -m 'test(bash): exempt unrelated static validator from local evidence freshness'
          git push origin HEAD:agent/bash-first-class-project-support
