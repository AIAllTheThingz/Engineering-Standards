name: Temporary repair Bash config boundary

on:
  pull_request:

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: agent/bash-first-class-project-support
          fetch-depth: 0

      - name: Reject caller tool configuration and add regression tests
        shell: python
        run: |
          from pathlib import Path

          validator_path = Path('scripts/bash-project-validation.py')
          validator = validator_path.read_text(encoding='utf-8')
          validator = validator.replace('    ".batsrc",\n', '')
          validator = validator.replace('    ".shellcheckrc",\n', '')
          validator = validator.replace(
              '}\nUNSAFE_ENVIRONMENT_VARIABLES = {',
              '}\nPROHIBITED_CALLER_TOOL_CONFIG_NAMES = {".batsrc", ".shellcheckrc"}\nUNSAFE_ENVIRONMENT_VARIABLES = {',
              1,
          )
          validator = validator.replace(
              '            relative = path.relative_to(root)\n            if stat.S_ISLNK(mode):',
              '            relative = path.relative_to(root)\n'
              '            if name in PROHIBITED_CALLER_TOOL_CONFIG_NAMES:\n'
              '                raise ValueError(f"project contains prohibited caller tool configuration: {relative}")\n'
              '            if stat.S_ISLNK(mode):',
              1,
          )
          validator_path.write_text(validator, encoding='utf-8')

          tests_path = Path('tests/bash/bash_project_validation_tests.py')
          tests = tests_path.read_text(encoding='utf-8')
          anchor = '''    def test_syntax_shellcheck_formatting_and_bats_failures_propagate(self) -> None:\n'''
          new_test = '''    def test_caller_tool_configuration_is_rejected_before_copy(self) -> None:\n        project = self.make_project()\n        for name in (".batsrc", ".shellcheckrc"):\n            with self.subTest(name=name):\n                config = project / name\n                config.write_text("caller-controlled configuration\\n", encoding="utf-8")\n                with self.assertRaisesRegex(ValueError, "prohibited caller tool configuration"):\n                    validator.inspect_project_tree(project)\n                config.unlink()\n\n'''
          tests = tests.replace(anchor, new_test + anchor, 1)
          tests_path.write_text(tests, encoding='utf-8')

          Path('.github/workflows/temporary-repair-bash-config-boundary.yml').unlink()

      - name: Commit repaired boundary
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/bash-project-validation.py tests/bash/bash_project_validation_tests.py .github/workflows/temporary-repair-bash-config-boundary.yml
          git commit -m 'fix(bash): reject caller tool configuration'
          git push origin HEAD:agent/bash-first-class-project-support
