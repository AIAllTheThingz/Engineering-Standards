name: Pull Request Governance
on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review
permissions:
  contents: read
  pull-requests: read
jobs:
  validate:
    name: Validate pull request governance record
    permissions:
      contents: read
      pull-requests: read
