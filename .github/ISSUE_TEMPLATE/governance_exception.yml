name: Governance Exception
description: Submit a governance exception.
title: "Governance Exception: "
labels: [governance]
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Describe the affected repository, governance version, and observed behavior.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact and risk
      description: Describe risk, security impact, data impact, and urgency.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized evidence
      description: Include logs or evidence without secrets.
