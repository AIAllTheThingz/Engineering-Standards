name: Repository Health
description: Checks required files, docs, schema validity, tests, fixtures, CODEOWNERS, Dependabot, and governance freshness.
inputs:
  path:
    description: path input for Repository Health.
    required: false
  output-json:
    description: output-json input for Repository Health.
    required: false
  advisory:
    description: advisory input for Repository Health.
    required: false
outputs:
  report-path:
    description: report-path emitted by Repository Health.
  failed-count:
    description: failed-count emitted by Repository Health.
runs:
  using: composite
  steps:
    - name: Run Repository Health
      id: run
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $argsList = @('-Path', '${{ inputs.path }}')
        if ('${{ inputs.output-json }}') { $argsList += @('-OutputJson', '${{ inputs.output-json }}') }
        if ('${{ inputs.advisory }}' -eq 'true') { $argsList += '-Advisory' }
        $reportPath = '${{ inputs.output-json }}'
        if (-not $reportPath) {
          $reportPath = Join-Path $env:RUNNER_TEMP 'repository-health-report.json'
          $argsList += @('-OutputJson', $reportPath)
        }
        & '${{ github.action_path }}/Invoke-RepositoryHealth.ps1' @argsList
        $exitCode = $LASTEXITCODE
        $failedCount = 0
        if (Test-Path -LiteralPath $reportPath -PathType Leaf) {
          $report = Get-Content -LiteralPath $reportPath -Raw | ConvertFrom-Json
          $failedCount = [int]$report.failed
        }
        "report-path=$reportPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "failed-count=$failedCount" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        exit $exitCode
