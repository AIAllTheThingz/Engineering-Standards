name: Repository Health
description: Checks required files, docs, schema validity, tests, fixtures, CODEOWNERS, Dependabot, and governance freshness.
inputs:
  path:
    description: path input for Repository Health.
    required: false
  output-json:
    description: output-json input for Repository Health.
    required: false
  advisory:
    description: advisory input for Repository Health.
    required: false
outputs:
  report-path:
    description: report-path emitted by Repository Health.
  failed-count:
    description: failed-count emitted by Repository Health.
runs:
  using: composite
  steps:
    - name: Run Repository Health
      id: run
      shell: pwsh
      run: |
        $argsList = @('-Path', '${{ inputs.path }}')
        if ('${{ inputs.output-json }}') { $argsList += @('-OutputJson', '${{ inputs.output-json }}') }
        if ('${{ inputs.advisory }}' -eq 'true') { $argsList += '-Advisory' }
        & '${{ github.action_path }}/Invoke-RepositoryHealth.ps1' @argsList
        "report-path=${{ inputs.output-json }}" >> $env:GITHUB_OUTPUT
        "failed-count=0" >> $env:GITHUB_OUTPUT
