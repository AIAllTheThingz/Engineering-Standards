name: Repository Health
description: Checks required files, docs, schema validity, tests, fixtures, CODEOWNERS, Dependabot, and governance freshness.
inputs:
  path:
    description: path input for Repository Health.
    required: false
    default: .
  output-json:
    description: output-json input for Repository Health.
    required: false
  advisory:
    description: advisory input for Repository Health.
    required: false
  repository-owner-type:
    description: Trusted repository metadata or verified GitHub API owner type. Unknown performs structural validation without asserting user-versus-organization compatibility; this does not prove an identity exists or can review.
    required: false
    default: Unknown
outputs:
  report-path:
    description: report-path emitted by Repository Health.
  failed-count:
    description: failed-count emitted by Repository Health.
runs:
  using: composite
  steps:
    - name: Run Repository Health
      id: run
      shell: pwsh
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_OUTPUT_JSON: ${{ inputs.output-json }}
        INPUT_ADVISORY: ${{ inputs.advisory }}
        INPUT_REPOSITORY_OWNER_TYPE: ${{ inputs.repository-owner-type }}
        REPOSITORY_HEALTH_ACTION_PATH: ${{ github.action_path }}
      run: |
        $ErrorActionPreference = 'Stop'
        $ownerType = $env:INPUT_REPOSITORY_OWNER_TYPE
        if (@('Unknown', 'User', 'Organization') -cnotcontains $ownerType) {
          throw "repository-owner-type must be exactly Unknown, User, or Organization; received '$ownerType'."
        }
        $invokeParameters = @{ Path = $env:INPUT_PATH; RepositoryOwnerType = $ownerType }
        if ($env:INPUT_OUTPUT_JSON) { $invokeParameters.OutputJson = $env:INPUT_OUTPUT_JSON }
        if ($env:INPUT_ADVISORY -eq 'true') { $invokeParameters.Advisory = $true }
        $reportPath = $env:INPUT_OUTPUT_JSON
        if (-not $reportPath) {
          $reportPath = '.tmp/repository-health-report.json'
          $invokeParameters.OutputJson = $reportPath
        }
        & (Join-Path $env:REPOSITORY_HEALTH_ACTION_PATH 'Invoke-RepositoryHealth.ps1') @invokeParameters
        $exitCode = $LASTEXITCODE
        $failedCount = 0
        $reportFile = Join-Path $env:INPUT_PATH $reportPath
        if (Test-Path -LiteralPath $reportFile -PathType Leaf) {
          $report = Get-Content -LiteralPath $reportFile -Raw | ConvertFrom-Json
          $failedCount = [int]$report.failed
        }
        "report-path=$reportPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "failed-count=$failedCount" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        exit $exitCode
