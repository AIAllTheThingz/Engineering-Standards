name: Validate Evidence
description: Validates completion evidence, status consistency, timestamp order, and artifact hashes.
inputs:
  path:
    description: path input for Validate Evidence.
    required: false
  evidence-path:
    description: evidence-path input for Validate Evidence.
    required: false
  expected-commit-sha:
    description: expected-commit-sha input for Validate Evidence.
    required: false
  output-json:
    description: output-json input for Validate Evidence.
    required: false
outputs:
  report-path:
    description: report-path emitted by Validate Evidence.
  failed-count:
    description: failed-count emitted by Validate Evidence.
runs:
  using: composite
  steps:
    - name: Run Validate Evidence
      id: run
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $argsList = @('-Path', '${{ inputs.path }}')
        if ('${{ inputs.evidence-path }}') { $argsList += @('-EvidencePath', '${{ inputs.evidence-path }}') }
        if ('${{ inputs.expected-commit-sha }}') { $argsList += @('-ExpectedCommitSha', '${{ inputs.expected-commit-sha }}') }
        if ('${{ inputs.output-json }}') { $argsList += @('-OutputJson', '${{ inputs.output-json }}') }
        $reportPath = '${{ inputs.output-json }}'
        if (-not $reportPath) {
          $reportPath = Join-Path $env:RUNNER_TEMP 'validate-evidence-report.json'
          $argsList += @('-OutputJson', $reportPath)
        }
        & '${{ github.action_path }}/Invoke-EvidenceValidation.ps1' @argsList
        $exitCode = $LASTEXITCODE
        $failedCount = 0
        if (Test-Path -LiteralPath $reportPath -PathType Leaf) {
          $report = Get-Content -LiteralPath $reportPath -Raw | ConvertFrom-Json
          $failedCount = [int]$report.failed
        }
        "report-path=$reportPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "failed-count=$failedCount" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        exit $exitCode
