name: Validate Contract
description: Validates manifest, governance config, required documentation, standards, exceptions, and documentation completeness.
inputs:
  path:
    description: path input for Validate Contract.
    required: false
  manifest-path:
    description: manifest-path input for Validate Contract.
    required: false
  config-path:
    description: config-path input for Validate Contract.
    required: false
  output-json:
    description: output-json input for Validate Contract.
    required: false
  advisory:
    description: advisory input for Validate Contract.
    required: false
outputs:
  report-path:
    description: report-path emitted by Validate Contract.
  failed-count:
    description: failed-count emitted by Validate Contract.
runs:
  using: composite
  steps:
    - name: Run Validate Contract
      id: run
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $argsList = @('-Path', '${{ inputs.path }}')
        if ('${{ inputs.output-json }}') { $argsList += @('-OutputJson', '${{ inputs.output-json }}') }
        if ('${{ inputs.advisory }}' -eq 'true') { $argsList += '-Advisory' }
        $reportPath = '${{ inputs.output-json }}'
        if (-not $reportPath) {
          $reportPath = Join-Path $env:RUNNER_TEMP 'validate-contract-report.json'
          $argsList += @('-OutputJson', $reportPath)
        }
        & '${{ github.action_path }}/Invoke-ContractValidation.ps1' @argsList
        $exitCode = $LASTEXITCODE
        $failedCount = 0
        if (Test-Path -LiteralPath $reportPath -PathType Leaf) {
          $report = Get-Content -LiteralPath $reportPath -Raw | ConvertFrom-Json
          $failedCount = [int]$report.failed
        }
        "report-path=$reportPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "failed-count=$failedCount" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        exit $exitCode
